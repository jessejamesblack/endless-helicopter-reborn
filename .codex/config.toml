[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.supabase]
url = "https://mcp.supabase.com/mcp?project_ref=lxvniafwjlwatbiblwyi&read_only=true"
bearer_token_env_var = "SUPABASE_ACCESS_TOKEN"
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.godot]
command = "C:\\Program Files\\nodejs\\npx.cmd"
args = ["-y", "@n24q02m/better-godot-mcp@latest"]
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.context7]
command = "C:\\Program Files\\nodejs\\npx.cmd"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.context7.env]
PATH = "C:\\Program Files\\nodejs;C:\\Windows\\System32;C:\\Windows"
PATHEXT = ".COM;.EXE;.BAT;.CMD"

# Optional local/user-only MCP servers that fit this project:
#
# 1. GitHub's remote MCP server for PRs, Actions, and issue workflows.
#    Keep this in a user-local config instead of committing auth setup here.
#
# [mcp_servers.github]
# url = "https://api.githubcopilot.com/mcp/"
# bearer_token_env_var = "GITHUB_PAT_TOKEN"
#
# Optional remote GitHub headers when your MCP host supports them:
# [mcp_servers.github.headers]
# X-MCP-Toolsets = "repos,issues,pull_requests,actions"
